            overflow: hidden;

        .particle {
            position: absolute;

        @keyframes floatParticle {
            0% { 
                transform: translateY(110vh) scale(0.5);

    <!-- ===== ANTI-DEVELOPER TOOLS PERSISTENTE ===== -->
    <script>
        (function antiDevTools() {
            let devToolsBlocked = false;
            let devToolsCheckInterval = null;

            function createBlocker() {
                if (document.getElementById('devtools-blocker')) return;

                const blocker = document.createElement('div');
                blocker.id = 'devtools-blocker';
                blocker.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    background: rgba(0, 0, 0, 0.97);
                    backdrop-filter: blur(20px);
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    z-index: 999999;
                    color: white;
                    font-family: 'Segoe UI', sans-serif;
                    flex-direction: column;
                    gap: 20px;
                    animation: fadeIn 0.4s ease;
                    pointer-events: auto;
                `;
                blocker.innerHTML = `
                    <span style="font-size: 48px;">🚫</span>
                    <p style="color: rgba(255,255,255,0.4); font-size: 18px;">Developer tools detected</p>
                    <p style="color: rgba(255,255,255,0.2); font-size: 14px;">Please close the developer tools to continue</p>
                    <button onclick="location.reload()" style="
                        padding: 12px 32px;
                        background: rgba(255,255,255,0.05);
                        border: 1px solid rgba(255,255,255,0.06);
                        border-radius: 12px;
                        color: white;
                        font-size: 15px;
                        cursor: pointer;
                        transition: all 0.3s;
                        margin-top: 10px;
                    ">🔄 Reload page</button>
                `;
                document.body.appendChild(blocker);

                if (!document.getElementById('devtools-style')) {
                    const style = document.createElement('style');
                    style.id = 'devtools-style';
                    style.textContent = `
                        @keyframes fadeIn {
                            from { opacity: 0; }
                            to { opacity: 1; }
                        }
                    `;
                    document.head.appendChild(style);
                }

                const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                        if (mutation.removedNodes.length > 0) {
                            if (!document.getElementById('devtools-blocker')) {
                                createBlocker();
                            }
                        }
                    });
                });
                observer.observe(document.body, { childList: true, subtree: true });
                window._devtoolsObserver = observer;
            }

            function blockDevTools() {
                if (devToolsBlocked) return;
                devToolsBlocked = true;
                createBlocker();
                if (devToolsCheckInterval) {
                    clearInterval(devToolsCheckInterval);
                    devToolsCheckInterval = null;
                }
            }

            function checkDevTools() {
                if (devToolsBlocked) return;
                
                const before = new Date();
                debugger;
                const after = new Date();
                if (after - before > 100) {
                    blockDevTools();
                    return;
                }

                const threshold = 160;
                const widthDiff = window.outerWidth - window.innerWidth;
                const heightDiff = window.outerHeight - window.innerHeight;
                if (widthDiff > threshold || heightDiff > threshold) {
                    blockDevTools();
                    return;
                }

                if (window.Firebug && window.Firebug.chrome && window.Firebug.chrome.isInitialized) {
                    blockDevTools();
                    return;
                }

                const blocker = document.getElementById('devtools-blocker');
                if (blocker && blocker.style.display === 'none') {
                    blocker.style.display = 'flex';
                }
            }

            function startDevToolsDetection() {
                if (devToolsCheckInterval) {
                    clearInterval(devToolsCheckInterval);
                }
                devToolsCheckInterval = setInterval(checkDevTools, 400);
                setTimeout(checkDevTools, 100);
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12') {
                    e.preventDefault();
                    blockDevTools();
                    return false;
                }
                if (e.ctrlKey && e.shiftKey && ['I', 'J'].includes(e.key.toUpperCase())) {
                    e.preventDefault();
                    blockDevTools();
                    return false;
                }
                if (e.ctrlKey && e.key.toUpperCase() === 'U') {
                    e.preventDefault();
                    blockDevTools();
                    return false;
                }
                if (e.ctrlKey && e.key.toUpperCase() === 'S') {
                    e.preventDefault();
                    blockDevTools();
                    return false;
                }
            });

            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            const originalRemoveChild = Element.prototype.removeChild;
            Element.prototype.removeChild = function(child) {
                if (child && child.id === 'devtools-blocker') {
                    setTimeout(() => {
                        if (!document.getElementById('devtools-blocker')) {
                            createBlocker();
                        }
                    }, 10);
                    return originalRemoveChild.call(this, child);
                }
                return originalRemoveChild.call(this, child);
            };

            const originalRemove = Element.prototype.remove;
            Element.prototype.remove = function() {
                if (this.id === 'devtools-blocker') {
                    setTimeout(() => {
                        if (!document.getElementById('devtools-blocker')) {
                            createBlocker();
                        }
                    }, 10);
                    return;
                }
                return originalRemove.call(this);
            };

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', startDevToolsDetection);
            } else {
                startDevToolsDetection();
            }

            const observer = new MutationObserver(function() {
                if (!document.getElementById('devtools-blocker') && devToolsBlocked) {
                    createBlocker();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });
            window._devtoolsMutationObserver = observer;

        })();
    </script>

    <div class="container" id="main-container">
        <div class="header">
            <div class="logo">
                <span class="logo-icon">🔒</span>
                <h1>Link <span>Lock</span> <span style="font-size:14px;background:none;-webkit-text-fill-color:rgba(255,255,255,0.2);">V2</span></h1>

            <div class="form-group">
                <label for="password-input" id="password-label">Password</label>

                    <input type="password" id="password-input" placeholder="Enter the password..." autofocus>

                <span class="btn-shine"></span>

            </button>
        </div>

        <div id="preview">

            <div class="result-check">🔓</div>

            <div class="redirect-message">
                <div class="redirect-text">You are about to be redirected to</div>
                <div class="redirect-name" id="redirect-name"></div>
            </div>

            <div class="countdown" id="countdown">
                Redirecting in <span id="countdown-number">5</span> seconds...
            </div>
            <div class="countdown-bar">
                <div class="countdown-bar-fill" id="countdown-bar-fill"></div>

                Please wait<span class="dots"></span>

                <div class="hint-label">💡 Hint</div>

            </div>

        <div class="error-box" id="error-box">
            <h3>❌ Error</h3>
            <p id="error-message">Wrong password. Try again.</p>

    <script src="b64.js"></script>
    <script src="api.js"></script>
    <script>
        // ============================================================
        //  DECRYPT - Fixed Password: pippo
        //  Puntini più grandi e visibili
        // ============================================================

        (function createParticles() {
            const container = document.getElementById('particles');
            const count = 60; // Più numerosi

            // Colori per varietà
            const colors = [
                'rgba(46, 213, 115, 0.5)',   // verde
                'rgba(79, 172, 254, 0.4)',   // blu
                'rgba(255, 255, 255, 0.3)',  // bianco
                'rgba(102, 126, 234, 0.4)',  // viola chiaro
                'rgba(46, 213, 115, 0.3)'    // verde chiaro
            ];

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Dimensione più grande (3-7px)
                const size = Math.random() * 4 + 3;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                // Colore casuale
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                // Posizione orizzontale casuale
                particle.style.left = Math.random() * 100 + '%';
                
                // Durata casuale (8-25 secondi)
                const duration = Math.random() * 17 + 10;
                particle.style.animationDuration = duration + 's';
                
                // Ritardo iniziale (0-3 secondi)
                const delay = Math.random() * 3;
                particle.style.animationDelay = delay + 's';
                
                // Opacità di base
                particle.style.opacity = Math.random() * 0.3 + 0.2;
                
                // Aggiungi glow (shadow)
                particle.style.boxShadow = '0 0 8px ' + particle.style.background;
                
                container.appendChild(particle);
            }
        })();

        const DECRYPT_PASSWORD = "pippo";
        let redirectTimer = null;
        let currentUrl = '';
        let countdownValue = 5;
        let isProcessing = false;
        let typingTimeout = null;

        document.addEventListener('DOMContentLoaded', function() {
            const passwordInput = document.getElementById('password-input');
            const decryptBtn = document.getElementById('decrypt-btn');
            const formSection = document.getElementById('form-section');
            const resultDiv = document.getElementById('result');
            const errorBox = document.getElementById('error-box');
            const errorMessage = document.getElementById('error-message');
            const previewDiv = document.getElementById('preview');
            const previewName = document.getElementById('preview-name');
            const countdownDiv = document.getElementById('countdown');
            const countdownNumber = document.getElementById('countdown-number');
            const countdownBarFill = document.getElementById('countdown-bar-fill');
            const hintDisplay = document.getElementById('hint-display');
            const hintText = document.getElementById('hint-text');
            const redirectName = document.getElementById('redirect-name');
            const passwordLabel = document.getElementById('password-label');
            const inputIcon = document.getElementById('input-icon');

            function resetFieldEffects() {
                passwordInput.classList.remove('success', 'error', 'typing');
                passwordLabel.classList.remove('success', 'error');
                inputIcon.classList.remove('success', 'error');
                clearTimeout(typingTimeout);
            }

            function showTypingEffect() {
                if (isProcessing) return;
                passwordInput.classList.add('typing');
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    passwordInput.classList.remove('typing');
                }, 800);
            }

            passwordInput.addEventListener('input', function() {
                if (this.value.length > 0 && !isProcessing) {
                    showTypingEffect();
                } else {
                    passwordInput.classList.remove('typing');
                }
            });

            passwordInput.addEventListener('focus', function() {
                if (this.value.length > 0 && !isProcessing) {
                    showTypingEffect();
                }
            });

            passwordInput.addEventListener('blur', function() {
                passwordInput.classList.remove('typing');
                clearTimeout(typingTimeout);
            });

            function showSuccessEffect() {
                resetFieldEffects();
                passwordInput.classList.add('success');
                passwordLabel.classList.add('success');
                inputIcon.classList.add('success');

                setTimeout(() => {
                    passwordInput.classList.remove('success');
                    passwordLabel.classList.remove('success');
                    inputIcon.classList.remove('success');
                }, 2000);
            }

            function showErrorEffect() {
                resetFieldEffects();
                passwordInput.classList.add('error');
                passwordLabel.classList.add('error');
                inputIcon.classList.add('error');

                setTimeout(() => {
                    passwordInput.classList.remove('error');
                    passwordLabel.classList.remove('error');
                    inputIcon.classList.remove('error');
                }, 1500);
            }

            function showToast(message, type = 'error') {
                const oldToasts = document.querySelectorAll('.toast');
                oldToasts.forEach(t => {
                    t.classList.add('toast-hide');
                    setTimeout(() => t.remove(), 500);
                });

                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.classList.add('toast-hide');
                    setTimeout(() => toast.remove(), 500);
                }, 3500);
            }

            function getHashFromUrl() {
                const hash = window.location.hash;
                if (hash && hash.length > 1) {
                    return hash.substring(1);
                }
                return null;
            }

            function startCountdown(url, shortName) {
                if (redirectTimer) {
                    clearInterval(redirectTimer);
                }
                
                formSection.classList.add('hidden');
                previewDiv.classList.add('hidden');
                
                redirectName.textContent = shortName;
                
                countdownValue = 5;
                countdownNumber.textContent = countdownValue;
                countdownDiv.style.display = 'block';
                
                countdownBarFill.style.animation = 'none';
                void countdownBarFill.offsetWidth;
                countdownBarFill.style.animation = 'countdownBar 5s linear forwards';
                
                redirectTimer = setInterval(() => {
                    countdownValue--;
                    countdownNumber.textContent = countdownValue;
                    
                    if (countdownValue <= 0) {
                        clearInterval(redirectTimer);
                        redirectTimer = null;
                        window.location.href = url;
                    }
                }, 1000);
            }

            function extractPreviewData(hash) {
                try {
                    const compressed = JSON.parse(atob(hash));
                    return {
                        short: compressed.n || null,
                        full: compressed.f || null
                    };
                } catch {
                    return { short: null, full: null };
                }
            }

            function showPreviewFromHash() {
                const hash = getHashFromUrl();
                
                if (!hash) {
                    previewDiv.classList.remove('show');
                    return;
                }

                const data = extractPreviewData(hash);
                if (data.short) {
                    previewName.textContent = data.short;
                    previewDiv.classList.add('show');
                } else {
                    previewDiv.classList.remove('show');
                }
            }

            async function decryptLink() {
                const password = passwordInput.value.trim();
                
                const hash = getHashFromUrl();
                if (!hash) {
                    errorMessage.textContent = 'No link to decrypt.';
                    errorBox.classList.add('show');
                    resultDiv.classList.remove('show');
                    return;
                }

                if (!password) {
                    showToast('❌ Enter the password', 'error');
                    passwordInput.focus();
                    return;
                }

                errorBox.classList.remove('show');
                resultDiv.classList.remove('show');
                hintDisplay.classList.remove('show');

                isProcessing = true;
                decryptBtn.disabled = true;
                decryptBtn.textContent = '⏳ Decrypting...';

                try {
                    const compressed = JSON.parse(atob(hash));
                    
                    if (!compressed.v) {
                        throw new Error('Unsupported link format');
                    }

                    const isCorrect = (password === DECRYPT_PASSWORD);
                    
                    if (!isCorrect) {
                        showErrorEffect();
                        throw new Error('Wrong password');
                    }

                    showSuccessEffect();

                    const decryptedData = await decryptData(compressed, DECRYPT_PASSWORD);
                    
                    let url = decryptedData;
                    let hint = '';
                    let shortName = compressed.n || 'site';
                    
                    try {
                        const parsed = JSON.parse(decryptedData);
                        if (parsed.u) {
                            url = parsed.u;
                            if (parsed.h) {
                                hint = parsed.h;
                                hintText.textContent = hint;
                                hintDisplay.classList.add('show');
                            }
                            if (parsed.e) {
                                const expiry = new Date(parsed.e);
                                if (expiry < new Date()) {
                                    showToast('⏰ This link has expired!', 'error');
                                }
                            }
                        }
                    } catch {
                        // Not JSON
                    }

                    currentUrl = url;
                    
                    resultDiv.classList.add('show');
                    
                    formSection.classList.add('hidden');
                    previewDiv.classList.add('hidden');
                    
                    showToast('✅ Link decrypted!', 'success');
                    
                    startCountdown(url, shortName);

                } catch (error) {
                    errorMessage.textContent = error.message || 'Error during decryption.';
                    errorBox.classList.add('show');
                    showToast('❌ ' + error.message, 'error');
                    console.error(error);
                } finally {
                    isProcessing = false;
                    decryptBtn.disabled = false;
                    decryptBtn.textContent = '🔓 Decrypt Link';
                }
            }

            decryptBtn.addEventListener('click', decryptLink);

            passwordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    decryptLink();
                }
            });

            const hashFromUrl = getHashFromUrl();
            if (hashFromUrl) {
                showPreviewFromHash();
                showToast('🔗 Link detected! Enter the password.', 'info');
                passwordInput.focus();
            } else {
                errorMessage.textContent = 'No link to decrypt.';
                errorBox.classList.add('show');
                previewDiv.classList.remove('show');
            }

            setTimeout(() => {
                passwordInput.focus();
            }, 500);
        });
    </script>
