<html lang="en">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatParticle linear infinite;
            opacity: 0;
        }

        @keyframes floatParticle {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            5% { opacity: 0.6; }
            85% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(46, 213, 115, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(79, 172, 254, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(102, 126, 234, 0.02) 0%, transparent 50%);
            animation: backgroundMove 20s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes backgroundMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(2%, 2%) rotate(3deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 28px;
            padding: 45px 40px 35px;
            max-width: 480px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: containerIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes containerIn {
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 6px;
        }

        .logo-icon {
            font-size: 32px;
            animation: pulseIcon 3s ease-in-out infinite;
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .header h1 {
            color: #fff;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            background: linear-gradient(135deg, #2ed573, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            color: rgba(255, 255, 255, 0.35);
            font-size: 13px;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }

        .badge {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(46, 213, 115, 0.12);
            color: #2ed573;
            border: 1px solid rgba(46, 213, 115, 0.15);
            margin-top: 8px;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(46, 213, 115, 0.3), transparent);
            margin: 12px auto 18px;
            border-radius: 2px;
        }

        #form-section {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #form-section.hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
            max-height: 0;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            transition: color 0.4s ease;
        }

        .form-group label.success {
            color: #2ed573;
        }

        .form-group label.error {
            color: #e94560;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 16px 18px;
            padding-left: 48px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(46, 213, 115, 0.3);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(46, 213, 115, 0.05);
            transform: translateY(-1px);
        }

        .form-group input.typing {
            border-color: rgba(79, 172, 254, 0.25);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.03);
        }

        .form-group input.success {
            border-color: #2ed573;
            background: rgba(46, 213, 115, 0.04);
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.05);
        }

        .form-group input.error {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.04);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.05);
            animation: inputShake 0.5s ease;
        }

        @keyframes inputShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.3px;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0.3;
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .form-group input:focus + .input-icon,
        .form-group input:focus ~ .input-icon {
            opacity: 0.8;
        }

        .form-group input.success ~ .input-icon {
            opacity: 1;
            color: #2ed573;
        }

        .form-group input.error ~ .input-icon {
            opacity: 1;
            color: #e94560;
            animation: iconShake 0.5s ease;
        }

        @keyframes iconShake {
            0%, 100% { transform: translateY(-50%) rotate(0deg); }
            25% { transform: translateY(-50%) rotate(-15deg); }
            75% { transform: translateY(-50%) rotate(15deg); }
        }

        .btn {
            padding: 16px 30px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            width: 100%;
            position: relative;
            overflow: hidden;
            font-family: inherit;
            letter-spacing: 0.3px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2d3436, #1a1a2e);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px -10px rgba(0, 0, 0, 0.5);
            border-color: rgba(46, 213, 115, 0.15);
        }

        .btn-primary:active {
            transform: translateY(0px) scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary .btn-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes shine {
            0%, 100% { left: -100%; }
            50% { left: 100%; }
        }

        #preview {
            margin-top: 20px;
            padding: 15px 20px;
            background: rgba(79, 172, 254, 0.04);
            border: 1px solid rgba(79, 172, 254, 0.06);
            border-radius: 14px;
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #preview.show {
            display: block;
        }

        #preview.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            max-height: 0;
            overflow: hidden;
            padding: 0;
            margin: 0;
            border: none;
        }

        #preview .preview-label {
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        #preview .preview-name {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(135deg, #4facfe, #2ed573);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 4px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
        }

        .error-box {
            background: rgba(233, 69, 96, 0.06);
            border: 1px solid rgba(233, 69, 96, 0.1);
            border-radius: 14px;
            padding: 18px 20px;
            text-align: center;

            margin-top: 15px;
            animation: errorShake 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .error-box.show {
            display: block;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .error-box h3 {
            color: #e94560;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .error-box p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
        }

        .footer {
            margin-top: 28px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            letter-spacing: 0.8px;
            font-weight: 500;
        }

        .footer .version {
            display: inline-block;
            padding: 3px 14px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);

            color: rgba(255, 255, 255, 0.35);
        }

        .footer .version strong {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 14px 22px;
            border-radius: 14px;
            color: white;
            font-weight: 500;
            font-size: 13px;
            z-index: 99999;
            animation: toastIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 15px 40px -10px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            font-family: 'Segoe UI', sans-serif;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toast-error {
            background: rgba(233, 69, 96, 0.9);
        }

        .toast-success {
            background: rgba(46, 213, 115, 0.9);
        }

        .toast-info {
            background: rgba(79, 172, 254, 0.9);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateX(40px) scale(0.95); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        .toast-hide {
            animation: toastOut 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translateX(40px) scale(0.95); }
        }

        /* ===== ANTI-DEVTOOLS BLOCKER ===== */
        .devtools-blocker {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.97);
            backdrop-filter: blur(20px);
            z-index: 999999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            color: white;
            font-family: 'Segoe UI', sans-serif;

        }

        .devtools-blocker.active {
            display: flex;
        }

        .devtools-blocker .blocker-icon {
            font-size: 48px;
        }

        .devtools-blocker .blocker-title {
            font-size: 22px;
            font-weight: 700;

        }

        .devtools-blocker .blocker-text {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;

        }

        .devtools-blocker .blocker-btn {
            padding: 10px 32px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;

            font-size: 14px;
            cursor: pointer;

        .devtools-blocker .blocker-btn:hover {

        @media (max-width: 600px) {
            .container {
                padding: 30px 24px 28px;
                border-radius: 20px;
            }
            .header h1 {
                font-size: 22px;
            }

        @media (max-width: 400px) {

            #preview .preview-name {
                font-size: 24px;
            }
            .devtools-blocker .blocker-title {

            }
        }
    </style>
</head>

    <script>
        // ============================================================
        //  ANTI-DEVELOPER TOOLS (solo se attivati)
        // ============================================================

        (function antiDevTools() {
            var blocker = document.getElementById('devtools-blocker');
            var reloadBtn = document.getElementById('devtools-reload');
            var devToolsActive = false;
            var checkInterval = null;

            function activateBlocker() {
                if (devToolsActive) return;
                devToolsActive = true;
                blocker.classList.add('active');
                if (checkInterval) {
                    clearInterval(checkInterval);
                    checkInterval = null;
                }
            }

            function checkDevTools() {
                if (devToolsActive) return;

                var before = new Date();
                debugger;
                var after = new Date();
                if (after - before > 100) {
                    activateBlocker();
                    return;
                }

                var threshold = 160;
                var widthDiff = window.outerWidth - window.innerWidth;
                var heightDiff = window.outerHeight - window.innerHeight;
                if (widthDiff > threshold || heightDiff > threshold) {
                    activateBlocker();
                    return;
                }

                if (window.Firebug && window.Firebug.chrome && window.Firebug.chrome.isInitialized) {
                    activateBlocker();
                    return;
                }
            }

            document.addEventListener('keydown', function(e) {
                if (e.key === 'F12') {
                    e.preventDefault();
                    activateBlocker();
                    return false;
                }
                if (e.ctrlKey && e.shiftKey && ['I', 'J'].includes(e.key.toUpperCase())) {
                    e.preventDefault();
                    activateBlocker();
                    return false;
                }
                if (e.ctrlKey && e.key.toUpperCase() === 'U') {
                    e.preventDefault();
                    activateBlocker();
                    return false;
                }
                if (e.ctrlKey && e.key.toUpperCase() === 'S') {
                    e.preventDefault();
                    activateBlocker();
                    return false;
                }
            });

            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
            });

            checkInterval = setInterval(checkDevTools, 1000);
            setTimeout(checkDevTools, 200);

            if (reloadBtn) {
                reloadBtn.addEventListener('click', function() {
                    location.reload();
                });
            }

            var observer = new MutationObserver(function() {
                if (!document.getElementById('devtools-blocker') && devToolsActive) {
                    location.reload();
                }
            });
            observer.observe(document.body, { childList: true, subtree: true });

        })();

        // ============================================================
        //  DECRYPT - Fixed Password: pippo
        // ============================================================

        (function createParticles() {
            var container = document.getElementById('particles');
            var count = 60;
            var colors = [
                'rgba(46, 213, 115, 0.5)',
                'rgba(79, 172, 254, 0.4)',
                'rgba(255, 255, 255, 0.3)',
                'rgba(102, 126, 234, 0.4)',
                'rgba(46, 213, 115, 0.3)'
            ];

            for (var i = 0; i < count; i++) {
                var particle = document.createElement('div');
                particle.className = 'particle';
                var size = Math.random() * 4 + 3;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = Math.random() * 100 + '%';
                var duration = Math.random() * 17 + 10;
                particle.style.animationDuration = duration + 's';
                var delay = Math.random() * 3;
                particle.style.animationDelay = delay + 's';
                particle.style.opacity = Math.random() * 0.3 + 0.2;
                particle.style.boxShadow = '0 0 8px ' + particle.style.background;
                container.appendChild(particle);
            }
        })();

        var DECRYPT_PASSWORD = "pippo";
        var isProcessing = false;
        var typingTimeout = null;

        document.addEventListener('DOMContentLoaded', function() {
            var passwordInput = document.getElementById('password-input');
            var decryptBtn = document.getElementById('decrypt-btn');
            var errorBox = document.getElementById('error-box');
            var errorMessage = document.getElementById('error-message');
            var previewDiv = document.getElementById('preview');
            var previewName = document.getElementById('preview-name');
            var passwordLabel = document.getElementById('password-label');
            var inputIcon = document.getElementById('input-icon');

            function resetFieldEffects() {
                passwordInput.classList.remove('success', 'error', 'typing');
                passwordLabel.classList.remove('success', 'error');
                inputIcon.classList.remove('success', 'error');
                clearTimeout(typingTimeout);
            }

            function showTypingEffect() {
                if (isProcessing) return;
                passwordInput.classList.add('typing');
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(function() {
                    passwordInput.classList.remove('typing');
                }, 800);
            }

            passwordInput.addEventListener('input', function() {
                if (this.value.length > 0 && !isProcessing) {
                    showTypingEffect();
                } else {
                    passwordInput.classList.remove('typing');
                }
            });

            passwordInput.addEventListener('focus', function() {
                if (this.value.length > 0 && !isProcessing) {
                    showTypingEffect();
                }
            });

            passwordInput.addEventListener('blur', function() {
                passwordInput.classList.remove('typing');
                clearTimeout(typingTimeout);
            });

            function showSuccessEffect() {
                resetFieldEffects();
                passwordInput.classList.add('success');
                passwordLabel.classList.add('success');
                inputIcon.classList.add('success');

                setTimeout(function() {
                    passwordInput.classList.remove('success');
                    passwordLabel.classList.remove('success');
                    inputIcon.classList.remove('success');
                }, 2000);
            }

            function showErrorEffect() {
                resetFieldEffects();
                passwordInput.classList.add('error');
                passwordLabel.classList.add('error');
                inputIcon.classList.add('error');

                setTimeout(function() {
                    passwordInput.classList.remove('error');
                    passwordLabel.classList.remove('error');
                    inputIcon.classList.remove('error');
                }, 1500);
            }

            function showToast(message, type) {
                type = type || 'error';
                var oldToasts = document.querySelectorAll('.toast');
                oldToasts.forEach(function(t) {
                    t.classList.add('toast-hide');
                    setTimeout(function() { t.remove(); }, 500);
                });

                var toast = document.createElement('div');
                toast.className = 'toast toast-' + type;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(function() {
                    toast.classList.add('toast-hide');
                    setTimeout(function() { toast.remove(); }, 500);
                }, 3500);
            }

            function getHashFromUrl() {
                var hash = window.location.hash;
                if (hash && hash.length > 1) {
                    return hash.substring(1);
                }
                return null;
            }

            function extractPreviewData(hash) {
                try {
                    var compressed = JSON.parse(atob(hash));
                    return {
                        short: compressed.n || null,
                        full: compressed.f || null
                    };
                } catch {
                    return { short: null, full: null };
                }
            }

            function showPreviewFromHash() {
                var hash = getHashFromUrl();
                
                if (!hash) {
                    previewDiv.classList.remove('show');
                    return;
                }

                var data = extractPreviewData(hash);
                if (data.short) {
                    previewName.textContent = data.short;
                    previewDiv.classList.add('show');
                } else {
                    previewDiv.classList.remove('show');
                }
            }

            function redirectToUrl(url) {
                window.location.href = url;
            }

            async function decryptLink() {
                var password = passwordInput.value.trim();
                
                var hash = getHashFromUrl();
                if (!hash) {
                    errorMessage.textContent = 'No link to decrypt.';
                    errorBox.classList.add('show');
                    return;
                }

                if (!password) {
                    showToast('❌ Enter the password', 'error');
                    passwordInput.focus();
                    return;
                }

                errorBox.classList.remove('show');

                isProcessing = true;
                decryptBtn.disabled = true;
                decryptBtn.textContent = '⏳ Decrypting...';

                try {
                    var compressed = JSON.parse(atob(hash));
                    
                    if (!compressed.v) {
                        throw new Error('Unsupported link format');
                    }

                    var isCorrect = (password === DECRYPT_PASSWORD);
                    
                    if (!isCorrect) {
                        showErrorEffect();
                        throw new Error('Wrong password');
                    }

                    showSuccessEffect();

                    var decryptedData = await decryptData(compressed, DECRYPT_PASSWORD);
                    
                    var url = decryptedData;
                    
                    try {
                        var parsed = JSON.parse(decryptedData);
                        if (parsed.u) {
                            url = parsed.u;
                            if (parsed.e) {
                                var expiry = new Date(parsed.e);
                                if (expiry < new Date()) {
                                    showToast('⏰ This link has expired!', 'error');
                                }
                            }
                        }
                    } catch {
                        // Not JSON
                    }

                    showToast('✅ Link decrypted! Redirecting...', 'success');
                    
                    setTimeout(function() {
                        redirectToUrl(url);
                    }, 300);

                } catch (error) {
                    errorMessage.textContent = error.message || 'Error during decryption.';
                    errorBox.classList.add('show');
                    showToast('❌ ' + error.message, 'error');
                    console.error(error);
                } finally {
                    isProcessing = false;
                    decryptBtn.disabled = false;
                    decryptBtn.textContent = '🔓 Decrypt Link';
                }
            }

            decryptBtn.addEventListener('click', decryptLink);

            passwordInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    decryptLink();
                }
            });

            var hashFromUrl = getHashFromUrl();
            if (hashFromUrl) {
                showPreviewFromHash();
                showToast('🔗 Link detected! Enter the password.', 'info');
                passwordInput.focus();
            } else {
                errorMessage.textContent = 'No link to decrypt.';
                errorBox.classList.add('show');
                previewDiv.classList.remove('show');
            }

            setTimeout(function() {
                passwordInput.focus();
            }, 500);
        });
    </script>

</body>
</html>
